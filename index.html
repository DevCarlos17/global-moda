<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Global Moda Imports — Catálogo B2B" />
    <title>Global Moda Imports</title>
    <!-- Theme init: must run before first paint to prevent flash of wrong theme.
         Reads the Zustand persist key (gm-theme) and sets html.light immediately. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('gm-theme')
          if (s) {
            var theme = JSON.parse(s).state.theme
            if (theme === 'light') document.documentElement.classList.add('light')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
