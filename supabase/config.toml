# Configuración de Supabase CLI
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true

[auth]
enabled = true
# URL de tu app frontend (ajustar en producción)
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = false   # Solo admins crean usuarios

[auth.email]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.send-whatsapp]
verify_jwt = true

[functions.create-user]
verify_jwt = true   # requiere JWT válido; la función verifica el role admin internamente
